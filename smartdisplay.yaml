substitutions:
  BRIGHTNESS: "100"
  COLOR_1: "0x03A9F4"
  MEDIA_PLAYER: "media_player.kitchen"
  GLYPHS: " !\"#$%&'()*+,-./0123456789:;<=>°?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдеёжзийклмнопрстуфхцчшщъыьэюяҐЄІЇґєії"
  icon_xy: '65x65'
  WEATHER: "weather.forecast_home"
  AIR_QUALITY: "sensor.air_quality_index_krakow_air_quality_index"

esphome:
  name: smart-display
  friendly_name: SmartDisplay
  on_boot:
    - priority: 600
      then:
        - light.turn_on:
            id: backlight
            brightness: ${BRIGHTNESS}%
        - lambda: |-
            id(last_touch_ms) = millis();    

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "SmartDisplayHotspot"
  on_connect:
    - lambda: |-
        id(ha_connected) = true;
  on_disconnect:
    - lambda: |-
        id(ha_connected) = false;

captive_portal:

web_server:
  port: 80

globals:
  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: '20'
  - id: screen_is_on
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: ha_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ha_logo_visible
    type: bool
    initial_value: 'true'

number:
  - platform: template
    name: "Screen Timeout"
    id: screen_timeout
    min_value: 5
    max_value: 60
    step: 1
    unit_of_measurement: "s"
    initial_value: 20
    restore_value: true
    optimistic: true

text:
  - platform: template
    name: "Notification"
    id: notification_input
    optimistic: true
    mode: text
    initial_value: ""
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x.length() > 0;'
            then:
              - logger.log:
                  format: "📩 %s"
                  args: [ 'x.c_str()' ]

              - script.execute: notification_sound
              - script.execute: screen_on
              - lvgl.label.update:
                  id: notification_label
                  text: !lambda 'return x;'
              - lvgl.obj.update:
                  id: notification_popup
                  hidden: false

image:
