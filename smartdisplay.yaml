    id: hail
    type: RGB565
    transparency: alpha_channel
    resize: ${icon_xy}
  - file: "images/5-lightning.png"
    id: lightning
    type: RGB565
    transparency: alpha_channel
    resize: ${icon_xy}
  - file: "images/6-lightning-rainy.png"
    id: lightningrainy
    type: RGB565
