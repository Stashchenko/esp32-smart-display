              border_color: green
              align: CENTER

              widgets:
                - label:
                    id: air_icon_label
                    align: CENTER
                    text: "\U000F0D43"
                    text_font: material
                    text_color: 0xFFFFFF
          - label:
              id: aqi_label
              align: CENTER
              x: 19
              y: 65
              text_font: roboto_big_24
              text_color: 0xFFFFFF
