    size: 12
    bpp: 4
    glyphs: $GLYPHS
    ignore_missing_glyphs: true

  - file: "fonts/Roboto.ttf"
    id: roboto_17
    size: 17
    bpp: 4
    glyphs: $GLYPHS
    ignore_missing_glyphs: true

  - file: "fonts/Roboto.ttf"
    id: roboto_big
    size: 19
    bpp: 4
    glyphs: $GLYPHS
    ignore_missing_glyphs: true

  - file: "fonts/Roboto.ttf"
    id: roboto_big_24
    size: 26
    bpp: 4
    glyphs: $GLYPHS
    ignore_missing_glyphs: true

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: material
    size: 42
    bpp: 4
    glyphs: [
      "\U000F040A", # play
      "\U000F03E4", # pause
      "\U000F04AD", # next
      "\U000F04AE", # previous
      "\U000F057E", # volume
      "\U000F075D", # volume up
      "\U000F075E", # volume down
      "\U000F07D0", # Home Assistant icon
      "\U000F0D43", # air quality
      "\U000F0079", # battery icon
    ]

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - script.execute: time_update
        - script.execute: sleep_decider
    on_time:
      - cron: '0 * * * * *' # once per minute
        then:
          - script.execute: time_update
          - script.execute: sleep_decider

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: label_time
          text: !lambda |-
            char buff[10] = "-";
            auto time = id(ha_time).now();
            if (time.is_valid())
              sprintf(buff, "%02d:%02d", time.hour, time.minute);
            return buff;
      - lvgl.label.update:
          id: label_date
          text: !lambda |-
            char buff[12] = "-";
            auto time = id(ha_time).now();
            if (time.is_valid()) {
              sprintf(buff, "%02d/%02d/%04d",
                      time.day_of_month,
                      time.month,
                      time.year);
            }
            return buff;
      - lvgl.label.update:
          id: label_day
          text: !lambda |-
            auto time = id(ha_time).now();
            if (!time.is_valid()) return std::string("---");

            const char* days[] = {"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"};
            return std::string(days[time.day_of_week - 1]);  

  - id: screen_off
    then:
      - lambda: |-
          if (!id(screen_is_on)) return;

          id(screen_is_on) = false;          
          ESP_LOGI("screen", "🌙 Screen OFF");
      - light.turn_off: backlight
      - lvgl.obj.update:
          id: touch_overlay
          hidden: false
      - lvgl.obj.update:
          id: notification_popup
          clickable: false   # when screen off

  - id: screen_on
    then:
      - lambda: |-
          if (id(screen_is_on)) return;  // already on

          id(screen_is_on) = true;          
          id(last_touch_ms) = millis();
          ESP_LOGI("screen", "🌞 Screen ON");
      - light.turn_on:
          id: backlight
          brightness: ${BRIGHTNESS}%
      - delay: 200ms
      - lvgl.obj.update:
          id: notification_popup
          clickable: true    # when screen on

  - id: notification_sound
    then:
      - if:
          condition:
            switch.is_off: mute_notifications
          then:
            - rtttl.play: !lambda |-
                std::string melody = id(notify_melody).current_option();
                
                if (melody == "nokia_pop")
                  return "nokia_pop:d=8,o=5,b=370: c5, e5, g5, p, c5, e5, g5";
                else if (melody == "scale_up")
                  return "scale_up:d=32,o=5,b=100:c,c#,d#,e,f#,g#,a#,b";
                else if (melody == "two_short")
                  return "two_short:d=4,o=5,b=100:16e6,16e6";
                else if (melody == "siren")          
                  return "siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e";
                else if (melody == "star_wars")
                  return "star_wars:d=16,o=5,b=100:4e,4e,4e,8c,p,g,4e,8c,p,g,4e,4p,4b,4b,4b,8c6,p,g,4d#,8c,p,g,4e,8p";
                else if (melody == "mission_imp")
                  return "mission_imp:d=16,o=6,b=95:32d,32d#,32d,32d#,32d,32d#,32d,32d#,32d,32d,32d#,32e,32f,32f#,32g,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,a#,g,2d,32p,a#,g,2c#,32p,a#,g,2c,a#5,8c,2p,32p,a#5,g5,2f#,32p,a#5,g5,2f,32p,a#5,g5,2e,d#,8d";
                else if (melody == "mario")
                  return "mario:d=4,o=5,b=100:16e6,16e6,32p,8e6,16c6,8e6,8g6,8p,8g,8p,8c6,16p,8g,16p,8e,16p,8a,8b,16a#,8a,16g.,16e6,16g6,8a6,16f6,8g6,8e6,16c6,16d6,8b,16p,8c6,16p,8g,16p,8e,16p,8a,8b,16a#,8a,16g.,16e6,16g6,8a6,16f6,8g6,8e6,16c6,16d6,8b,8p,16g6,16f#6,16f6,16d#6,16p,16e6,16p,16g#,16a,16c6,16p,16a,16c6,16d6,8p,16g6,16f#6,16f6,16d#6,16p,16e6,16p,16c7,16p,16c7,16c7,p,16g6,16f#6,16f6,16d#6,16p,16e6,16p,16g#,16a,16c6,16p,16a,16c6,16d6,8p,16d#6,8p,16d6,8p,16c6";
                
                return "nokia_pop:d=8,o=5,b=370: c5, e5, g5, p, c5, e5, g5";

  - id: center_screen_volume
    then:
      - lambda: |-
          id(last_center_screen_label_updated) = millis();
      - lvgl.obj.update:
          id: center_screen_obj
          hidden: false
      - lvgl.label.update:
          id: center_screen_icon
          text: "\U000F057E"
      - lvgl.label.update:
          id: center_screen_label
          text: !lambda |-
            float vol = id(media_volume).state;
            if (isnan(vol)) vol = 0;
            int vol_percent = int(ceilf(vol * 100.0));
            char buff[8];
            sprintf(buff, "%d%%", vol_percent);
            return std::string(buff);

  - id: sleep_decider
    then:
      - lambda: |-
          ESP_LOGI("sleep", "Check sleep");
          if (!id(sleep_enabled).state) {
            ESP_LOGI("sleep", "Sleep disabled → staying awake");
            return;
          }

          auto t = id(ha_time).now();
          if (!t.is_valid()) {
            ESP_LOGW("sleep", "Time is not ready");           
            return;
          }

          int now_h = t.hour;
          int start = int(id(sleep_start_hour).state);
          int end   = int(id(sleep_end_hour).state);

          bool in_sleep;
          if (start < end) {
            in_sleep = (now_h >= start && now_h < end);
          } else {
            in_sleep = (now_h >= start || now_h < end);
          }

          if (in_sleep) {
            ESP_LOGI("sleep", "🌙 Sleep window → going back to deep sleep");
            id(go_to_sleep).execute();
          } else {
            ESP_LOGI("sleep", "🌞 Awake window → staying active");
          }

  - id: go_to_sleep
    then:
      - script.execute: screen_off
      - delay: 1s
      - logger.log: "Entering Deep Sleep for 30 min..."
      - deep_sleep.enter:
          id: night_sleep
          sleep_duration: 30min
output:
