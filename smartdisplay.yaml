    id: bgrnd_forest
    type: RGB565

interval:
  - interval: 1s
    then:
      # check ha connection
      - if:
          condition:
            lambda: 'return !id(ha_connected);'   # only blink if disconnected
          then:
            - lambda: |-
                static bool visible = true;
                visible = !visible;  // toggle
                id(ha_logo_visible) = visible;
            - lvgl.label.update:
                id: ha_logo
                text_color: red
                hidden: !lambda 'return !id(ha_logo_visible);'
          else:
            - lvgl.label.update:
                id: ha_logo
                hidden: false  # always visible when connected
                text_color: $COLOR_1

      # script to lock the screen
      - lambda: |-
          if (!id(screen_is_on)) return;  // ✅ STOP everything if already off

          float timeout_sec = id(screen_timeout).state;

          if (isnan(timeout_sec) || timeout_sec < 1) {
            timeout_sec = 20;
          }

          uint32_t timeout_ms = uint32_t(timeout_sec * 1000);

          if (millis() - id(last_touch_ms) > timeout_ms) {
            ESP_LOGI("screen", "⏳ Timeout reached -> turning screen OFF");
            id(screen_off).execute();
          }          

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    id: wifi_signal_db
    entity_category: "diagnostic"
    internal: true  # hide this sensor to HA,

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    icon: mdi:wifi
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: " %"
    entity_category: "diagnostic"
    device_class: ""

  - platform: homeassistant
    id: media_volume
    entity_id: $MEDIA_PLAYER
    attribute: volume_level
    on_value:
      - lvgl.label.update:
          id: volume_label
          text: !lambda |-
            float vol = x;
            if (isnan(vol)) vol = 0;

            int vol_percent = int(ceilf(vol * 100.0));
            char buff[8];
            sprintf(buff, "VOL: %d%%", vol_percent);
            return std::string(buff);

  - platform: homeassistant
    id: weather_temperature
    entity_id: $WEATHER
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: weather_temp_label
          text: !lambda |-
            char buff[10];
            sprintf(buff, "%.1f°C", x);;            
            return std::string(buff);    

  - platform: homeassistant
    id: air_quality_index
    entity_id: $AIR_QUALITY
    on_value:
      - lambda: |-
          ESP_LOGI("aqi", "AQI value: %.0f", x);
      - lvgl.label.update:
          id: aqi_label
          text: !lambda |-
            char buff[10];
            sprintf(buff, "%.0f", x);
            return std::string(buff);
      - lvgl.obj.update:
          id: air_quality_icon
          bg_color: !lambda |-
            if (x <= 50) return lv_color_hex(0x00E400);      // good (green)
            if (x <= 100) return lv_color_hex(0xFFFF00);     // moderate (yellow)
            if (x <= 150) return lv_color_hex(0xFF7E00);     // unhealthy for sensitive
            if (x <= 200) return lv_color_hex(0xFF0000);     // unhealthy
            if (x <= 300) return lv_color_hex(0x99004C);     // very unhealthy
            return lv_color_hex(0x7E0023);                   // hazardous
          border_color:
            !lambda |-
            if (x <= 50) return lv_color_hex(0x00E400);      // good (green)
            if (x <= 100) return lv_color_hex(0xFFFF00);     // moderate (yellow)
            if (x <= 150) return lv_color_hex(0xFF7E00);     // unhealthy for sensitive
            if (x <= 200) return lv_color_hex(0xFF0000);     // unhealthy
            if (x <= 300) return lv_color_hex(0x99004C);     // very unhealthy
            return lv_color_hex(0x7E0023);                   // hazardous     

  - platform: homeassistant
    id: weather_wind_speed
    entity_id: $WEATHER
    attribute: wind_speed
    on_value:
      - lambda: |-
          ESP_LOGI("weather", "Wind speed: %.1f", x);
      - lvgl.label.update:
          id: wind_label
          text: !lambda |-
            char buff[16];
            sprintf(buff, "%.0f", x);
            return std::string(buff);

  - platform: homeassistant
    id: weather_wind_bearing
    entity_id: $WEATHER
    attribute: wind_bearing
    on_value:
      - lvgl.image.update:
          id: wind_arrow_img
          angle: !lambda |-
            float deg = x + 90.0;  // arrow points right by default
            if (deg >= 360.0) deg -= 360.0;

            return int(deg * 10);  // LVGL uses 0.1° units          

text_sensor:
  - platform: homeassistant
    id: media_title
    entity_id: $MEDIA_PLAYER
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: media_label
          text: !lambda |-
            if (x.length() > 0) return x.c_str();
            return "No media";

  - platform: homeassistant
    id: media_state
    entity_id: $MEDIA_PLAYER
    on_value:
      - lvgl.label.update:
          id: play_btn_label
          text: !lambda |-
            if (x == "playing") return "\U000F03E4"; // pause
            return "\U000F040A"; // play

  - platform: homeassistant
    id: weather_condition
    entity_id: $WEATHER
    on_value:
      - lvgl.image.update:
          id: weather_icon_img
          src: !lambda |-
            // Convert x (state) to image ID
            std::string s = x;        
            
            if (s == "clear-night") return id(clearnight);
            if (s == "cloudy") return id(cloudy);
            if (s == "fog") return id(fog);
            if (s == "hail") return id(hail);
            if (s == "lightning") return id(lightning);
            if (s == "lightning-rainy") return id(lightningrainy);
            if (s == "partlycloudy") return id(partlycloudy);
            if (s == "pouring") return id(pouring);
            if (s == "rainy") return id(rainy);
            if (s == "snowy") return id(snowy);
            if (s == "snowy-rainy") return id(snowyrainy);
            if (s == "sunny") return id(sunny);
            if (s == "windy") return id(windy);
            if (s == "windy-variant") return id(windyvariant);
            if (s == "exceptional") return id(exceptional);
            
            return id(initial);

select:
  - platform: template
    name: "Melody"
    id: notify_melody
    optimistic: true
    options:
      - nokia_pop
      - scale_up
      - two_short
      - siren
      - star_wars
      - mission_imp
      - mario
    initial_option: nokia_pop
    on_value:
      then:
        - script.execute: notification_sound

light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    id: backlight
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: |-
          id(last_touch_ms) = millis();
          id(screen_is_on) = true;          
          ESP_LOGI("screen", "☀️ Backlight ON → reset timer");

spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: ili9xxx
    model: ILI9342
    invert_colors: false
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    transform:
      mirror_y: true
    color_palette: 8BIT
    color_order: RGB
    auto_clear_enabled: false
    update_interval: never

touchscreen:
  platform: xpt2046
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 240
    x_max: 3750
    y_min: 290
    y_max: 3750
  transform:
    swap_xy: true
  on_touch:
    - lambda: |-
        if (!id(screen_is_on)) {
          ESP_LOGI("screen", "👆 Wake screen");
          id(screen_on).execute();
        }
        id(last_touch_ms) = millis(); 
        ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
            touch.x,
            touch.y,
            touch.x_raw,
            touch.y_raw
            );      

font:
  - file: "fonts/BebasNeue-Regular.ttf"
    id: bebas_big
    size: 36
    bpp: 4

  - file: "fonts/Roboto.ttf"
    id: roboto
    size: 12
    bpp: 4
    glyphs: $GLYPHS
    ignore_missing_glyphs: true

  - file: "fonts/Roboto.ttf"
    id: roboto_big
    size: 20
    bpp: 4
    glyphs: $GLYPHS
    ignore_missing_glyphs: true

  - file: "fonts/Roboto.ttf"
    id: roboto_big_24
    size: 26
    bpp: 4
    glyphs: $GLYPHS
    ignore_missing_glyphs: true

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: material
    size: 42
    bpp: 4
    glyphs: [
      "\U000F040A", # play
      "\U000F03E4", # pause
      "\U000F04AD", # next
      "\U000F04AE", # previous
      "\U000F075D", # volume up
      "\U000F075E", # volume down
      "\U000F07D0", # Home Assistant icon
      "\U000F0D43", # air quality
    ]

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - cron: '* * * * * *'
        then:
          - script.execute: time_update

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: local_time
          text: !lambda |-
            char buff[10] = "-";
            auto time = id(ha_time).now();
            if (time.is_valid())
              sprintf(buff, "%02d:%02d", time.hour, time.minute);
            return buff;

  - id: screen_off
    then:
      - lambda: |-
          if (!id(screen_is_on)) return;

          id(screen_is_on) = false;
          ESP_LOGI("screen", "🌙 Screen OFF");
      - light.turn_off: backlight
      - lvgl.obj.update:
          id: touch_overlay
          hidden: false
      - lvgl.obj.update:
          id: notification_popup
          clickable: false   # when screen off

  - id: screen_on
    then:
      - lambda: |-
          if (id(screen_is_on)) return;  // already on

          id(screen_is_on) = true;
          id(last_touch_ms) = millis();
          ESP_LOGI("screen", "🌞 Screen ON");
      - light.turn_on:
          id: backlight
          brightness: ${BRIGHTNESS}%
      - delay: 200ms
      - lvgl.obj.update:
          id: notification_popup
          clickable: true    # when screen on

  - id: notification_sound
    then:
      - rtttl.play: !lambda |-
          std::string melody = id(notify_melody).current_option();
          
          if (melody == "nokia_pop")
            return "nokia_pop:d=8,o=5,b=370: c5, e5, g5, p, c5, e5, g5";
          else if (melody == "scale_up")
            return "scale_up:d=32,o=5,b=100:c,c#,d#,e,f#,g#,a#,b";
          else if (melody == "two_short")
            return "two_short:d=4,o=5,b=100:16e6,16e6";
          else if (melody == "siren")          
            return "siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e";
          else if (melody == "star_wars")
            return "star_wars:d=16,o=5,b=100:4e,4e,4e,8c,p,g,4e,8c,p,g,4e,4p,4b,4b,4b,8c6,p,g,4d#,8c,p,g,4e,8p";
          else if (melody == "mission_imp")
            return "mission_imp:d=16,o=6,b=95:32d,32d#,32d,32d#,32d,32d#,32d,32d#,32d,32d,32d#,32e,32f,32f#,32g,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,a#,g,2d,32p,a#,g,2c#,32p,a#,g,2c,a#5,8c,2p,32p,a#5,g5,2f#,32p,a#5,g5,2f,32p,a#5,g5,2e,d#,8d";
          else if (melody == "mario")
            return "mario:d=4,o=5,b=100:16e6,16e6,32p,8e6,16c6,8e6,8g6,8p,8g,8p,8c6,16p,8g,16p,8e,16p,8a,8b,16a#,8a,16g.,16e6,16g6,8a6,16f6,8g6,8e6,16c6,16d6,8b,16p,8c6,16p,8g,16p,8e,16p,8a,8b,16a#,8a,16g.,16e6,16g6,8a6,16f6,8g6,8e6,16c6,16d6,8b,8p,16g6,16f#6,16f6,16d#6,16p,16e6,16p,16g#,16a,16c6,16p,16a,16c6,16d6,8p,16g6,16f#6,16f6,16d#6,16p,16e6,16p,16c7,16p,16c7,16c7,p,16g6,16f#6,16f6,16d#6,16p,16e6,16p,16g#,16a,16c6,16p,16a,16c6,16d6,8p,16d#6,8p,16d6,8p,16c6";
          
          return "nokia_pop:d=8,o=5,b=370: c5, e5, g5, p, c5, e5, g5";

output:
  - platform: ledc
    pin: GPIO26
    id: rtttl_out
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm

rtttl:
  output: rtttl_out

lvgl:
  buffer_size: 25%
  bg_color: 0x000000
  scrollbar_mode: "OFF"
  scrollable: false
  widgets:
    - obj:
        id: bgfill
        width: 320
        height: 240
        align: TOP_LEFT
        bg_opa: 100%
        border_width: 0
        scrollable: false
        scrollbar_mode: "OFF"
        widgets:
          - image:
              id: bgrnd_forest_img
              src: bgrnd_forest
              align: CENTER

    - label:
        id: ha_logo
        align: TOP_LEFT
        text: "\U000F07D0"   # Home Assistant icon
        text_font: material
        text_color: $COLOR_1   # official HA blue
        translate_x: 0       # optional padding from the edge
        translate_y: 0       # optional padding from the top

    - label:
        align: TOP_LEFT
        id: local_time
        text: "--:--"
        text_font: bebas_big
        text_color: 0x000000
        translate_x: 43
        translate_y: 3

    - obj:
