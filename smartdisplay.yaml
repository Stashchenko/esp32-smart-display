              width: 50
              height: 40
              x: -70
              y: 6
              align: CENTER
              # radius: 15
              bg_color: 0xFFFFFF
              widgets:
                - label:
                    align: CENTER
                    text: "\U000F04AE"
                    text_color: 0x101010
                    text_font: material
              on_click:
                - homeassistant.service:
                    service: media_player.media_previous_track
                    data:
                      entity_id: $MEDIA_PLAYER

          # Next
          - button:
              width: 50
              height: 40
              x: 70
              y: 6
              align: CENTER
              # radius: 15
              bg_color: 0xFFFFFF
              widgets:
                - label:
                    align: CENTER
                    text: "\U000F04AD"  # next
                    text_font: material
                    text_color: 0x101010
              on_click:
                - homeassistant.service:
                    service: media_player.media_next_track
                    data:
                      entity_id: $MEDIA_PLAYER
          # Volume Up button
          - button:
              width: 50
              height: 40
              x: 125
              y: 6
              align: CENTER
              # radius: 15
              bg_color: 0xFFFFFF
              widgets:
                - label:
                    align: CENTER
                    text: "\U000F075D"  # volume up
                    text_font: material
                    text_color: 0x101010
              on_click:
                - homeassistant.service:
                    service: media_player.volume_up
                    data:
                      entity_id: $MEDIA_PLAYER

          # Volume Down button
          - button:
              width: 50
              height: 40
              x: -125
              y: 6
              align: CENTER
              bg_color: 0xFFFFFF
              widgets:
                - label:
                    align: CENTER
                    text: "\U000F075E"  # volume down
                    text_font: material
                    text_color: 0x101010
              on_click:
                - homeassistant.service:
                    service: media_player.volume_down
                    data:
                      entity_id: $MEDIA_PLAYER

          # Volume label inside media_box
          - label:
              id: volume_label
              align: TOP_RIGHT
              y: -13
              x: 6
              width: 55
              text_font: roboto
              long_mode: SCROLL_CIRCULAR
              text_color: 0xFFFFFF
              text: "N/A"

    - obj:
        id: touch_overlay
        width: 320
        height: 240
        align: CENTER

        bg_color: 0x000000
        bg_opa: 100%          # 100% dark overlay

        border_width: 0
        radius: 0
        hidden: true         # start hidden (screen ON)
        clickable: false      # MUST capture touch
        scrollable: false

        widgets:
          - label:
              align: CENTER
              text: "TAP TO UNLOCK"
              text_font: roboto
              text_color: 0x212121
        on_click:
          - light.turn_on:
              id: backlight
              brightness: ${BRIGHTNESS}%
          - lambda: |-
              id(last_touch_ms) = millis();  // reset timer on wake
          - lvgl.obj.update:
              id: touch_overlay
              hidden: true

    - obj:
        id: notification_popup
        width: 280
        height: 100
        align: TOP_LEFT
        translate_x: 20          # move right to center horizontally
        translate_y: 3           # distance from top
        radius: 10
        hidden: true
        clickable: true
        scrollable: false

        # Gradient background
        bg_color: $COLOR_1
        border_color: $COLOR_1
        border_width: 0


        widgets:
          - label:
              id: notification_label
              align: CENTER
              width: 260
              text: ""
              text_font: roboto_big
              text_color: 0xFFFFFF
              long_mode: WRAP
        on_click:
          - logger.log: "Notification dismissed"
          - rtttl.stop
          - lvgl.obj.update:
              id: notification_popup
              hidden: true
              clickable: false
