interval:
  - interval: 1s
    then:
      # check ha connection
      - if:
          condition:
            lambda: 'return !id(ha_connected);'   # only blink if disconnected
          then:
            - lambda: |-
                static bool visible = true;
                visible = !visible;  // toggle
                id(ha_logo_visible) = visible;
            - lvgl.label.update:
                id: ha_logo
                text_color: red
                hidden: !lambda 'return !id(ha_logo_visible);'
          else:
            - lvgl.label.update:
                id: ha_logo
                hidden: false  # always visible when connected
                text_color: $COLOR_1

      # script to lock the screen
      - lambda: |-
          if (!id(screen_is_on)) return;  // ✅ STOP everything if already off

          float timeout_sec = id(screen_timeout).state;

          uint32_t timeout_ms = uint32_t(timeout_sec * 1000);

          if (millis() - id(last_touch_ms) > timeout_ms) {
            ESP_LOGI("screen", "⏳ Timeout reached -> turning screen OFF");
            id(screen_off).execute();
          }          

  - interval: 300ms
    then:
      - if:
          condition:
            lambda: |-
              return (millis() - id(last_center_screen_label_updated) > 1000);
          then:
            - lvgl.obj.update:
                id: center_screen_obj
                hidden: true

sensor:
  - platform: adc
    pin: GPIO35
    name: "Battery Voltage"
    id: batt_voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    attenuation: 11db
    update_interval: 30s
    on_value:
      then:
        - component.update: batt_level
    filters:
      - lambda: |-
          return x * 1.991;
      - sliding_window_moving_average:
          window_size: 20
          send_every: 5

  - platform: template
    name: "Battery Level"
    id: batt_level
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      auto v = id(batt_voltage).state;

      if (std::isnan(v)) {
        return {};
      }
      // ===== CONFIG =====
      const float VMIN = 2.92;   // battery empty
      const float VMAX = 4.25;  // battery full

      // region split points (tuned for Li-ion shape)
      const float VHIGH = 3.9;
      const float VMID  = 3.7;

      // ===== LOGIC =====
      if (v >= VMAX) return 100.0;
      if (v <= VMIN) return 0.0;

      // top (slow drop)
      if (v >= VHIGH) {
        return 75.0 + (v - VHIGH) * (25.0 / (VMAX - VHIGH));
      }

      // middle (flat plateau)
      if (v >= VMID) {
        return 50.0 + (v - VMID) * (25.0 / (VHIGH - VMID));
      }

      // bottom (fast drop)
      return (v - VMIN) * (50.0 / (VMID - VMIN));
    on_value:
      then:
        - lvgl.arc.update:
            id: battery_arc
            value: !lambda 'return x;'
            indicator:
              arc_color: !lambda |-
                if (x >= 80) return lv_color_hex(0x00FF00); // green
                if (x >= 50) return lv_color_hex(0x0000FF); // blue 
                if (x >= 15) return lv_color_hex(0xFFFF00); // yellow
                return lv_color_hex(0xFF0000); // red
        - lvgl.label.update:
            id: battery_label
            text: !lambda |-
              char buff[8];
              sprintf(buff, "%.0f%", x);
              return std::string(buff);  

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    id: wifi_signal_db
    entity_category: "diagnostic"
    internal: true  # hide this sensor to HA,

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    icon: mdi:wifi
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: " %"
    entity_category: "diagnostic"
    device_class: ""

  - platform: homeassistant
    id: media_volume
    entity_id: $MEDIA_PLAYER
    attribute: volume_level
    on_value:
      - script.execute: center_screen_volume

  - platform: homeassistant
    id: weather_temperature
    entity_id: $WEATHER
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: weather_temp_label
          text: !lambda |-
            char buff[10];
            sprintf(buff, "%.1f°C", x);;            
            return std::string(buff);    

  - platform: homeassistant
    id: air_quality_index
    entity_id: $AIR_QUALITY
    on_value:
      - lambda: |-
          ESP_LOGI("aqi", "AQI value: %.0f", x);
      - lvgl.label.update:
          id: aqi_label
          text: !lambda |-
            char buff[10];
            sprintf(buff, "%.0f", x);
            return std::string(buff);
      - lvgl.obj.update:
          id: air_quality_icon
          bg_color: !lambda |-
            if (x <= 50) return lv_color_hex(0x00E400);      // good (green)
            if (x <= 100) return lv_color_hex(0xFFFF00);     // moderate (yellow)
            if (x <= 150) return lv_color_hex(0xFF7E00);     // unhealthy for sensitive
            if (x <= 200) return lv_color_hex(0xFF0000);     // unhealthy
            if (x <= 300) return lv_color_hex(0x99004C);     // very unhealthy
            return lv_color_hex(0x7E0023);                   // hazardous
          border_color:
            !lambda |-
            if (x <= 50) return lv_color_hex(0x00E400);      // good (green)
            if (x <= 100) return lv_color_hex(0xFFFF00);     // moderate (yellow)
            if (x <= 150) return lv_color_hex(0xFF7E00);     // unhealthy for sensitive
            if (x <= 200) return lv_color_hex(0xFF0000);     // unhealthy
            if (x <= 300) return lv_color_hex(0x99004C);     // very unhealthy
            return lv_color_hex(0x7E0023);                   // hazardous     

  - platform: homeassistant
    id: weather_wind_speed
    entity_id: $WEATHER
    attribute: wind_speed
    on_value:
      - lambda: |-
          ESP_LOGI("weather", "Wind speed: %.1f", x);
      - lvgl.label.update:
          id: wind_label
          text: !lambda |-
            char buff[16];
            sprintf(buff, "%.0f", x);
            return std::string(buff);

  - platform: homeassistant
    id: weather_wind_bearing
    entity_id: $WEATHER
    attribute: wind_bearing
    on_value:
      - lvgl.image.update:
          id: wind_arrow_img
          angle: !lambda |-
            float deg = x + 90.0;  // arrow points right by default
            if (deg >= 360.0) deg -= 360.0;

            return int(deg * 10);  // LVGL uses 0.1° units          

text_sensor:
  - platform: homeassistant
    id: media_title
    entity_id: $MEDIA_PLAYER
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: media_label
          text: !lambda |-
            if (x.length() > 0) return x.c_str();
            return "No media";

  - platform: homeassistant
    id: media_state
    entity_id: $MEDIA_PLAYER
    on_value:
      - lvgl.label.update:
          id: play_btn_label
          text: !lambda |-
            if (x == "playing") return "\U000F03E4"; // pause
            return "\U000F040A"; // play

  - platform: homeassistant
    id: weather_condition
    entity_id: $WEATHER
    on_value:
      - lvgl.image.update:
          id: weather_icon_img
          src: !lambda |-
            // Convert x (state) to image ID
            std::string s = x;        
            
            if (s == "clear-night") return id(clearnight);
            if (s == "cloudy") return id(cloudy);
            if (s == "fog") return id(fog);
            if (s == "hail") return id(hail);
            if (s == "lightning") return id(lightning);
            if (s == "lightning-rainy") return id(lightningrainy);
            if (s == "partlycloudy") return id(partlycloudy);
            if (s == "pouring") return id(pouring);
            if (s == "rainy") return id(rainy);
            if (s == "snowy") return id(snowy);
            if (s == "snowy-rainy") return id(snowyrainy);
            if (s == "sunny") return id(sunny);
            if (s == "windy") return id(windy);
            if (s == "windy-variant") return id(windyvariant);
            if (s == "exceptional") return id(exceptional);
            
            return id(initial);

select:
  - platform: template
    name: "Melody"
    id: notify_melody
    icon: "mdi:music-note"
    optimistic: true
    options:
      - nokia_pop
      - scale_up
      - two_short
      - siren
      - star_wars
      - mission_imp
      - mario
    initial_option: nokia_pop

light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    id: backlight
    icon: "mdi:brightness-6"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: |-
          id(last_touch_ms) = millis();
          id(screen_is_on) = true;          
          ESP_LOGI("screen", "☀️ Backlight ON → reset timer");

spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: ili9xxx
    model: ILI9342
    invert_colors: false
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    transform:
      mirror_y: true
    color_palette: 8BIT
    color_order: RGB
    auto_clear_enabled: false
    update_interval: never

touchscreen:
  platform: xpt2046
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 240
    x_max: 3750
    y_min: 290
    y_max: 3750
  transform:
    swap_xy: true
  on_touch:
    - lambda: |-
        if (!id(screen_is_on)) {
          ESP_LOGI("screen", "👆 Wake screen");
          id(screen_on).execute();
        }
        id(last_touch_ms) = millis();

